<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle SQL Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#1a1a2e; color:#e0e0e0; font-family:system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; }
        #chat { flex:1; overflow-y:auto; padding:16px; }
        .msg { max-width:800px; margin:0 auto 16px; }
        .msg.user .bubble { background:#16213e; border:1px solid #0f3460; border-radius:12px; padding:12px 16px; white-space:pre-wrap; }
        .msg.assistant .bubble { background:#0f0f23; border:1px solid #1a1a3e; border-radius:12px; padding:16px; line-height:1.6; }
        .msg.assistant .bubble pre { background:#0d1117; border-radius:8px; padding:12px; overflow-x:auto; margin:8px 0; position:relative; }
        .msg.assistant .bubble code { font-family:'Cascadia Code','Fira Code',monospace; font-size:13px; }
        .msg.assistant .bubble p { margin:6px 0; }
        .msg.assistant .bubble h1,.msg.assistant .bubble h2,.msg.assistant .bubble h3 { color:#e94560; margin:12px 0 6px; }
        .msg.assistant .bubble ul,.msg.assistant .bubble ol { padding-left:20px; margin:6px 0; }
        .msg.assistant .bubble strong { color:#e94560; }
        .copy-btn { position:absolute; top:6px; right:6px; background:#333; color:#ccc; border:none; border-radius:4px; padding:3px 8px; font-size:11px; cursor:pointer; }
        .copy-btn:hover { background:#555; }
        .label { font-size:11px; color:#888; margin-bottom:4px; text-transform:uppercase; letter-spacing:1px; }
        #inputBar { border-top:1px solid #222; padding:12px; background:#111; }
        #inputBar form { max-width:800px; margin:0 auto; display:flex; gap:8px; }
        #inputBar textarea { flex:1; background:#1a1a2e; color:#e0e0e0; border:1px solid #333; border-radius:10px; padding:12px; font-size:15px; resize:none; font-family:inherit; outline:none; }
        #inputBar textarea:focus { border-color:#e94560; }
        #inputBar button { background:#e94560; color:#fff; border:none; border-radius:10px; padding:0 20px; cursor:pointer; font-size:15px; }
        #inputBar button:disabled { opacity:.4; cursor:default; }
        #inputBar button:hover:not(:disabled) { background:#c73650; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="inputBar">
        <form id="f">
            <textarea id="q" rows="2" placeholder="Ask about SQL, PL/SQL, or describe a database system to build..."></textarea>
            <button type="submit" id="s">Send</button>
        </form>
    </div>
    <script>
        const chat=document.getElementById("chat"),form=document.getElementById("f"),q=document.getElementById("q"),s=document.getElementById("s");
        let messages=[],streaming=false;
        marked.setOptions({highlight:(code,lang)=>{try{return lang&&hljs.getLanguage(lang)?hljs.highlight(code,{language:lang}).value:hljs.highlightAuto(code).value}catch{return code}},breaks:true,gfm:true});
        function render(md){let h=marked.parse(md);h=h.replace(/<pre><code([^>]*)>/g,'<div style="position:relative"><button class="copy-btn" onclick="copyC(this)">Copy</button><pre><code$1>');h=h.replace(/<\/code><\/pre>/g,'</code></pre></div>');return h}
        function copyC(b){const c=b.parentElement.querySelector("code").textContent;navigator.clipboard.writeText(c).then(()=>{b.textContent="Copied!";setTimeout(()=>b.textContent="Copy",1500)})}
        function addMsg(role,content){const d=document.createElement("div");d.className="msg "+role;const l=document.createElement("div");l.className="label";l.textContent=role==="user"?"You":"Assistant";const b=document.createElement("div");b.className="bubble";if(role==="user")b.textContent=content;else b.innerHTML=render(content);d.appendChild(l);d.appendChild(b);chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return b}
        async function send(text){if(streaming)return;streaming=true;s.disabled=true;messages.push({role:"user",content:text});addMsg("user",text);const bubble=addMsg("assistant","");let full="";try{const r=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages})});const reader=r.body.getReader();const dec=new TextDecoder();let buf="";while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const lines=buf.split("\n");buf=lines.pop();for(const line of lines){if(!line.startsWith("data: "))continue;const d=line.slice(6).trim();if(d==="[DONE]")break;try{const p=JSON.parse(d);if(p.error){full+="\n\n**Error:** "+p.error;break}const delta=p.choices?.[0]?.delta?.content;if(delta){full+=delta;bubble.innerHTML=render(full);chat.scrollTop=chat.scrollHeight}}catch{}}}messages.push({role:"assistant",content:full})}catch(e){bubble.innerHTML=render("**Error:** "+e.message)}streaming=false;s.disabled=false;q.focus()}
        form.addEventListener("submit",e=>{e.preventDefault();const t=q.value.trim();if(!t)return;q.value="";q.style.height="auto";send(t)});
        q.addEventListener("input",()=>{q.style.height="auto";q.style.height=Math.min(q.scrollHeight,150)+"px"});
        q.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();form.dispatchEvent(new Event("submit"))}});
    </script>
</body>
</html>
